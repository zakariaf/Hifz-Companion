# The app shell: the composition root, router, and locale/RTL wiring. It wires,
# gates, and declares — it computes nothing. This is the ONE manifest allowed to
# depend on every package (the full downward fan-in), precisely because it holds
# no logic.
name: app
description: Hifz Companion app shell — composition root, router, locale/RTL wiring.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.6.0
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  go_router: ^16.0.0
  # Full downward fan-in — expected here and only here.
  models:
    path: ../packages/models
  composition:
    path: ../packages/composition
  engine:
    path: ../packages/engine
  profiles:
    path: ../packages/profiles
  data:
    path: ../packages/data
  quran:
    path: ../packages/quran
  l10n:
    path: ../packages/l10n
  features:
    path: ../packages/features
  assets:
    path: ../packages/assets

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  # Bundled core muṣḥaf (E05): byte-exact Tanzil metadata + QUL layout/word-glyph
  # DBs + the 604 per-page KFGQPC QPC V2 glyph fonts. Tracked via Git LFS
  # (.gitattributes), SHA-256-pinned in the binary-baked manifest, verified
  # fail-closed at first launch. Never fetched at runtime (the app is offline).
  assets:
    - assets/quran/quran-data.xml
    - assets/quran/qpc-v2-15-lines.db
    - assets/quran/qpc-v2.db
    - assets/quran/fonts/
  # Bundled UI font (Vazirmatn, SIL OFL) — no google_fonts, never fetched at
  # runtime. A Sorani-covering face + the Estedad fallback are wired in E09; the
  # OFL license + .reuse/dep5 registration are finalised with E06-T04.
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
          weight: 400
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
