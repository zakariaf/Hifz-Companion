# The composition seams: the cross-layer Riverpod DI providers (persistence,
# engine, injected "today", active profile, app-ready, asset downloader, key
# store). It DECLARES the seams — each IO-opening one throws when read
# un-overridden — so the feature ViewModels (which depend down on this) can read
# them and the app composition root (main) overrides them with the live
# implementations. It holds no screen and computes no schedule.
name: composition
description: Hifz Companion composition seams — cross-layer Riverpod DI providers.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.6.0
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  models:
    path: ../models
  engine:
    path: ../engine
  data:
    path: ../data
  assets:
    path: ../assets
  # The bundled-core install seam registers the per-page glyph fonts through
  # quran's public registrar (the QPC_P### family stays inside quran; this layer
  # only orchestrates). composition is outside the pipeline-wall scan, so it may
  # name the font-registration entry — never the glyph/font tokens themselves.
  quran:
    path: ../quran

dev_dependencies:
  flutter_test:
    sdk: flutter
