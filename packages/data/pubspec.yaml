name: data
description: Local Drift/SQLite single source of truth for Hifz Companion.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.6.0
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.0.0
  sqlite3: ^2.0.0
  path: ^1.9.0
  path_provider: ^2.1.0 # locates the on-device hifz.sqlite (local IO, no socket)
  models:
    path: ../models
  engine:
    path: ../engine
  profiles:
    path: ../profiles

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Drift code generation (Decision log #3: Drift over SQLite). drift_dev +
  # build_runner generate database.g.dart from the table classes and the
  # committed drift_schemas/ snapshots; they are build-time tooling for the
  # already-sanctioned drift runtime dependency, never shipped in the binary.
  drift_dev: ^2.0.0
  build_runner: ^2.4.0
# Deliberately NO http (no user-data repository reaches the network — PRD C1),
# NO features (downward-only). Repositories/DTOs are the public surface; the raw
# DAOs stay private to the package.
