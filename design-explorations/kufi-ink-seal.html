<!DOCTYPE html>
<!-- Hifz — "KHAṬṬ KŪFĪ": ink-and-seal calligraphy. Throwaway mockup.
     Signature: near-black ink on warm paper, a square-Kufic motif block, oversized
     confident type, and a single vermillion khatam (seal) accent. Bold monochrome + 1. -->
<html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hifz · Khaṭṭ Kūfī</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Space+Grotesk:wght@500;700&family=Reem+Kufi:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f1ebdd;--paper-2:#e5dcc5;--ink:#15120d;--ink-soft:#4a443a;--muted:#8b8472;
    --seal:#cf3a2c;--seal-d:#a82b20;
    --ui:'Plus Jakarta Sans',sans-serif;--mono:'Space Grotesk',sans-serif;--ar:'Reem Kufi',sans-serif;
    --soft:0 40px 80px -44px rgba(20,16,10,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  body{font-family:var(--ui);color:var(--ink);min-height:100vh;padding:62px 26px 100px;
    background:radial-gradient(900px 500px at 80% -10%,#f7f2e6,transparent 60%),#e7dfcd;}
  .masthead{max-width:900px;margin:0 auto 46px;text-align:center;}
  .masthead .k{display:inline-block;font-size:11px;letter-spacing:.3em;text-transform:uppercase;font-weight:800;
    color:var(--paper);background:var(--ink);padding:7px 14px;}
  .masthead h1{font-weight:800;font-size:clamp(38px,6vw,72px);line-height:1;margin:14px 0 12px;letter-spacing:-.03em;}
  .masthead h1 em{font-style:normal;color:var(--seal);}
  .masthead p{max-width:560px;margin:0 auto;color:#5b5446;font-size:16px;line-height:1.6;}
  figure{display:flex;flex-direction:column;align-items:center;gap:20px;}
  figcaption{font-size:18px;color:#5b5446;font-style:italic;}

  .phone{width:404px;height:858px;border-radius:54px;padding:13px;background:linear-gradient(160deg,#211d15,#0d0b07);
    box-shadow:var(--soft);position:relative;margin:0 auto;}
  .phone::after{content:"";position:absolute;top:27px;left:50%;transform:translateX(-50%);width:116px;height:28px;
    border-radius:16px;background:#0a0905;z-index:30;}
  .screen{width:100%;height:100%;border-radius:42px;overflow:hidden;background:var(--paper);position:relative;}

  /* hard ink header (no curve) */
  .ink-band{background:var(--ink);color:var(--paper);padding:60px 26px 26px;position:relative;}
  .ink-band .lbl{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#b7ad95;font-weight:700;}
  .ink-band .ar{font-family:var(--ar);font-size:62px;line-height:.95;margin-top:10px;letter-spacing:.02em;}
  .ink-band .vr{height:4px;width:64px;background:var(--seal);margin-top:14px;}
  /* square-kufic motif, top-right of the band */
  .kufic{position:absolute;top:58px;right:26px;width:84px;height:84px;display:grid;
    grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(6,1fr);gap:3px;opacity:.92;}
  .kufic i{background:transparent;}
  .kufic i.f{background:var(--paper);}

  /* hero stat + seal */
  .hero{padding:26px 26px 0;position:relative;}
  .hero .tag{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .hero .num{font-family:var(--mono);font-weight:700;font-size:128px;line-height:.82;letter-spacing:-.05em;margin-top:4px;}
  .hero .num span{color:var(--seal);}
  .hero .say{font-size:15px;color:var(--ink-soft);margin-top:10px;max-width:230px;line-height:1.4;}
  /* vermillion seal (khatam) */
  .stamp{position:absolute;top:18px;right:24px;width:108px;height:108px;border-radius:50%;
    transform:rotate(-9deg);background:var(--seal);box-shadow:0 14px 30px -14px rgba(168,43,32,.7);
    display:grid;place-items:center;}
  .stamp::before{content:"";position:absolute;inset:9px;border:2px solid rgba(255,255,255,.85);border-radius:50%;}
  .stamp .grid{width:46px;height:46px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:3px;transform:rotate(9deg);}
  .stamp .grid i{background:rgba(255,255,255,.92);}
  .stamp .grid i.o{background:transparent;}

  .rule{height:3px;background:var(--ink);margin:30px 26px 16px;}

  .sec-h{display:flex;align-items:baseline;justify-content:space-between;padding:0 26px;margin-bottom:6px;}
  .sec-h h3{font-weight:800;font-size:22px;letter-spacing:-.01em;}
  .sec-h span{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:700;}

  .led{padding:0 26px;}
  .row{display:grid;grid-template-columns:42px 1fr auto;gap:14px;align-items:center;
    padding:16px 0;border-bottom:1.5px solid rgba(21,18,13,.16);}
  .row .no{width:42px;height:42px;display:grid;place-items:center;background:var(--ink);color:var(--paper);
    font-family:var(--mono);font-weight:700;font-size:15px;}
  .row .nm{font-weight:800;font-size:17px;}
  .row .nm small{display:block;font-weight:500;font-size:12px;color:var(--muted);margin-top:2px;}
  .row .tag2{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:6px 10px;}
  .row .tag2.r{background:var(--seal);color:#fff;}
  .row .tag2.s{background:var(--paper-2);color:var(--ink-soft);}

  .cta{position:absolute;left:26px;right:26px;bottom:26px;border:none;cursor:pointer;
    background:var(--ink);color:var(--paper);font-weight:800;font-size:16px;padding:18px;display:flex;
    align-items:center;justify-content:center;gap:10px;}
  .cta .dot{width:9px;height:9px;border-radius:50%;background:var(--seal);}
</style></head>
<body>
  <header class="masthead">
    <span class="k">Concept VII</span>
    <h1>Khaṭṭ — <em>ink &amp; seal</em>.</h1>
    <p>Bold monochrome calligraphy: near-black on warm paper, a square-Kufic motif, one vermillion seal.</p>
  </header>

  <figure>
    <div class="phone"><div class="screen">
      <div class="ink-band">
        <div class="lbl">Ḥifẓ · Muṣḥaf · Ḥafṣ</div>
        <div class="ar">حِفْظ</div>
        <div class="vr"></div>
        <div class="kufic">
          <i class="f"></i><i></i><i class="f"></i><i class="f"></i><i></i><i class="f"></i>
          <i class="f"></i><i></i><i></i><i></i><i></i><i class="f"></i>
          <i class="f"></i><i class="f"></i><i class="f"></i><i></i><i class="f"></i><i class="f"></i>
          <i class="f"></i><i></i><i class="f"></i><i></i><i></i><i class="f"></i>
          <i class="f"></i><i></i><i></i><i></i><i class="f"></i><i class="f"></i>
          <i class="f"></i><i></i><i class="f"></i><i class="f"></i><i></i><i class="f"></i>
        </div>
      </div>

      <div class="hero">
        <div class="stamp"><div class="grid"><i></i><i class="o"></i><i></i><i class="o"></i><i></i><i class="o"></i><i></i><i class="o"></i><i></i></div></div>
        <div class="tag">Retained</div>
        <div class="num">94<span>%</span></div>
        <div class="say">whole, across all thirty juz — nothing left to fade.</div>
      </div>

      <div class="rule"></div>
      <div class="sec-h"><h3>Today</h3><span>three entries</span></div>

      <div class="led">
        <div class="row"><span class="no">01</span><span class="nm">Al-Baqarah<small>pp. 22–23 · far cycle</small></span><span class="tag2 s">steady</span></div>
        <div class="row"><span class="no">02</span><span class="nm">Yā-Sīn<small>pp. 440–441</small></span><span class="tag2 s">steady</span></div>
        <div class="row"><span class="no">03</span><span class="nm">An-Naba’<small>p. 582 · weak lines</small></span><span class="tag2 r">revisit</span></div>
      </div>

      <button class="cta"><span class="dot"></span> Begin revision</button>
    </div></div>
    <figcaption>Khaṭṭ Kūfī · ink, paper &amp; a single seal</figcaption>
  </figure>
</body></html>
