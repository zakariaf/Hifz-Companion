<!DOCTYPE html>
<!-- Hifz — "BAYĀḌ / Nūr al-Kitāb": airy museum-editorial light theme. Throwaway mockup.
     Signature: oversized hairline numerals, gold-leaf girih line-art, a catalogue-raisonné
     list, hairline rules, vast negative space. Restraint as luxury. -->
<html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hifz · Bayāḍ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600&family=Reem+Kufi:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--paper:#fbf8f1;--ink:#1d1a17;--muted:#8a8378;--line:rgba(29,26,23,.14);
    --gold:#a9831f;--gold-soft:#d9b25a;
    --ui:'Plus Jakarta Sans',sans-serif;--serif:'Fraunces',Georgia,serif;--ar:'Reem Kufi',sans-serif;
    --soft:0 40px 80px -44px rgba(60,48,20,.45);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  body{font-family:var(--ui);color:var(--ink);min-height:100vh;padding:64px 26px 100px;
    background:radial-gradient(900px 500px at 80% -10%,#fff,transparent 60%),#f1ece1;}
  .masthead{max-width:900px;margin:0 auto 48px;text-align:center;}
  .masthead .k{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);font-weight:600;}
  .masthead h1{font-family:var(--serif);font-weight:300;font-size:clamp(38px,6vw,72px);line-height:1.02;
    margin:14px 0 12px;letter-spacing:-.01em;}
  .masthead h1 em{font-style:italic;color:var(--gold);}
  .masthead p{max-width:560px;margin:0 auto;color:#6f685c;font-size:16px;line-height:1.6;}
  figure{display:flex;flex-direction:column;align-items:center;gap:20px;}
  figcaption{font-family:var(--serif);font-style:italic;font-size:19px;color:#6f685c;}

  .phone{width:404px;height:858px;border-radius:54px;padding:13px;background:linear-gradient(160deg,#fff,#ece5d8);
    box-shadow:var(--soft),inset 0 1px 0 #fff;position:relative;margin:0 auto;}
  .phone::after{content:"";position:absolute;top:27px;left:50%;transform:translateX(-50%);width:116px;height:28px;
    border-radius:16px;background:#e7e0d2;z-index:30;}
  .screen{width:100%;height:100%;border-radius:42px;overflow:hidden;background:var(--paper);position:relative;padding:62px 30px 30px;}

  /* faint girih line-art, top-right */
  .girih{position:absolute;top:40px;right:-46px;width:210px;height:210px;opacity:.5;}
  .girih svg{width:100%;height:100%;}

  .top{display:flex;align-items:center;gap:14px;position:relative;z-index:2;}
  .top .lbl{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .top .rule{flex:1;height:1px;background:var(--line);}
  .top .idx{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--gold);}

  .hero{position:relative;z-index:2;margin-top:54px;}
  .hero .ar{font-family:var(--ar);font-size:20px;color:var(--gold);}
  .bignum{display:flex;align-items:flex-start;gap:6px;margin-top:6px;}
  .bignum .n{font-family:var(--serif);font-weight:300;font-size:168px;line-height:.82;letter-spacing:-.04em;}
  .bignum .pct{font-family:var(--serif);font-weight:300;font-size:42px;margin-top:18px;color:var(--gold);}
  .hero .cap{font-family:var(--serif);font-style:italic;font-size:21px;color:#4a443a;margin-top:14px;max-width:300px;line-height:1.3;}

  .ruleband{height:1px;background:var(--line);margin:40px 0 26px;position:relative;z-index:2;}
  .ruleband::after{content:"☉";position:absolute;left:0;top:50%;transform:translateY(-50%);background:var(--paper);
    padding-right:12px;color:var(--gold);font-size:13px;}

  .toplabel{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;position:relative;z-index:2;}
  .toplabel h3{font-family:var(--serif);font-weight:400;font-size:26px;}
  .toplabel span{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}

  .entry{position:relative;z-index:2;padding:16px 0;border-top:1px solid var(--line);display:grid;
    grid-template-columns:34px 1fr auto;gap:14px;align-items:center;}
  .entry .no{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--muted);}
  .entry .nm{font-family:var(--serif);font-size:19px;line-height:1.1;}
  .entry .nm small{display:block;font-family:var(--ui);font-size:11.5px;letter-spacing:.04em;color:var(--muted);margin-top:3px;text-transform:uppercase;}
  .entry .rt{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--gold);text-align:right;}
  .meter{grid-column:2 / -1;height:2px;background:rgba(169,131,31,.16);border-radius:2px;margin-top:10px;overflow:hidden;}
  .meter i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-soft));}

  .foot{position:absolute;left:30px;right:30px;bottom:30px;display:flex;align-items:center;justify-content:space-between;z-index:2;}
  .foot .begin{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--ink);border-bottom:1.5px solid var(--gold);padding-bottom:3px;}
  .foot .pp{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
</style></head>
<body>
  <header class="masthead">
    <div class="k">Concept III</div>
    <h1>Bayāḍ — <em>the white</em>.</h1>
    <p>A museum-quiet, editorial light theme. Hairline numerals, gold-leaf girih, and a contents-page calm.</p>
  </header>

  <figure>
    <div class="phone"><div class="screen">
      <div class="girih"><svg viewBox="0 0 200 200" fill="none" stroke="#a9831f" stroke-width="1">
        <circle cx="100" cy="100" r="88"/><circle cx="100" cy="100" r="64"/>
        <rect x="44" y="44" width="112" height="112" rx="4"/>
        <rect x="44" y="44" width="112" height="112" rx="4" transform="rotate(45 100 100)"/>
        <circle cx="100" cy="100" r="30"/>
        <rect x="78" y="78" width="44" height="44" transform="rotate(22.5 100 100)"/>
      </svg></div>

      <div class="top"><span class="lbl">Ḥifẓ · Muṣḥaf</span><span class="rule"></span><span class="idx">i / xxx</span></div>

      <div class="hero">
        <div class="ar">نُور الكِتاب</div>
        <div class="bignum"><span class="n">94</span><span class="pct">%</span></div>
        <div class="cap">retained, whole, across all thirty juz.</div>
      </div>

      <div class="ruleband"></div>
      <div class="toplabel"><h3>Today</h3><span>three entries</span></div>

      <div class="entry">
        <span class="no">01</span>
        <span class="nm">Al-Baqarah<small>The Heifer · pp. 22–23</small></span>
        <span class="rt">far cycle</span>
        <span class="meter"><i style="width:88%"></i></span>
      </div>
      <div class="entry">
        <span class="no">02</span>
        <span class="nm">Yā-Sīn<small>pp. 440–441</small></span>
        <span class="rt">steady</span>
        <span class="meter"><i style="width:96%"></i></span>
      </div>
      <div class="entry">
        <span class="no">03</span>
        <span class="nm">An-Naba’<small>The Tidings · p. 582</small></span>
        <span class="rt">revisit</span>
        <span class="meter"><i style="width:54%"></i></span>
      </div>

      <div class="foot"><span class="begin">Begin revision →</span><span class="pp">12 pages</span></div>
    </div></div>
    <figcaption>Bayāḍ · contents-page calm, gold-leaf girih</figcaption>
  </figure>
</body></html>
