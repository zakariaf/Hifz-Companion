<!DOCTYPE html>
<!-- Hifz — "ASṬURLĀB": your ḥifẓ as an antique astrolabe (Islamic golden-age instrument).
     Throwaway mockup. Signature: engraved brass rings, a graduated tick limb, a rotating
     rule + 8-point star rete (pure CSS), a central engraved reading. Honors the heritage
     of Islamic astronomy / prayer-timekeeping. Motion off under reduce-motion. -->
<html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hifz · Asṭurlāb</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Space+Grotesk:wght@500;700&family=Reem+Kufi:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0a1820;--night-2:#06121a;--patina:#1f4a46;
    --brass-1:#f0dca0;--brass-2:#c8a24a;--brass-3:#8a6d2e;--brass-4:#5e4a1f;
    --brass:linear-gradient(135deg,#f0dca0,#c8a24a 38%,#f4e6b4 52%,#9b7c34 70%,#d9b65e);
    --ink:#e9dcb8;--muted:#8fa39c;
    --ui:'Space Grotesk',sans-serif;--serif:'Cormorant Garamond',Georgia,serif;--ar:'Reem Kufi',sans-serif;
    --soft:0 44px 90px -40px rgba(0,0,0,.85);--soft-sm:0 22px 44px -24px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  body{font-family:var(--ui);color:var(--ink);min-height:100vh;padding:62px 26px 100px;
    background:radial-gradient(900px 600px at 16% -8%,#123,transparent 55%),
      radial-gradient(800px 600px at 110% 8%,#0c2a2a,transparent 50%),#05101a;}
  .masthead{max-width:920px;margin:0 auto 46px;text-align:center;}
  .masthead .k{display:inline-block;font-size:11px;letter-spacing:.32em;text-transform:uppercase;font-weight:700;
    color:#06121a;background:linear-gradient(120deg,#f0dca0,#c8a24a);padding:7px 14px;border-radius:5px;}
  .masthead h1{font-family:var(--serif);font-weight:500;font-size:clamp(38px,6vw,72px);line-height:1.02;margin:14px 0 12px;}
  .masthead h1 em{font-style:italic;background:var(--brass);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .masthead p{max-width:560px;margin:0 auto;color:#9fb6ae;font-size:16px;line-height:1.6;}
  figure{display:flex;flex-direction:column;align-items:center;gap:20px;}
  figcaption{font-family:var(--serif);font-style:italic;font-size:19px;color:#9fb6ae;}

  .phone{width:404px;height:858px;border-radius:54px;padding:13px;background:linear-gradient(160deg,#13201f,#060f0e);
    box-shadow:var(--soft),0 0 70px -24px rgba(200,162,74,.4);position:relative;margin:0 auto;}
  .phone::after{content:"";position:absolute;top:27px;left:50%;transform:translateX(-50%);width:116px;height:28px;
    border-radius:16px;background:#040b0a;z-index:60;}
  .screen{width:100%;height:100%;border-radius:42px;overflow:hidden;position:relative;padding:60px 26px 26px;
    background:radial-gradient(120% 80% at 50% 8%,#143033 0%,transparent 55%),
      linear-gradient(180deg,var(--night),var(--night-2));}

  .top{display:flex;align-items:center;justify-content:space-between;}
  .top .lbl{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--brass-2);font-weight:700;}
  .top .ar{font-family:var(--ar);font-size:20px;color:var(--brass-1);}

  /* ===== the astrolabe ===== */
  .dial{position:relative;width:312px;height:312px;margin:26px auto 0;border-radius:50%;
    box-shadow:0 30px 70px -28px #000, 0 0 0 6px #14100b, 0 0 0 7px rgba(240,220,160,.25);}
  .limb{position:absolute;inset:0;border-radius:50%;background:
      repeating-conic-gradient(from 0deg, rgba(0,0,0,.6) 0deg .7deg, transparent .7deg 6deg),
      repeating-conic-gradient(from 0deg, rgba(0,0,0,.75) 0deg 1.4deg, transparent 1.4deg 30deg),
      var(--brass);
    box-shadow:inset 0 2px 5px rgba(255,255,255,.35),inset 0 -8px 20px rgba(0,0,0,.5);}
  .plate{position:absolute;inset:26px;border-radius:50%;overflow:hidden;
    background:
      repeating-conic-gradient(from 0deg, rgba(200,162,74,.10) 0 .4deg, transparent .4deg 15deg),
      radial-gradient(circle at 50% 38%, #14393b 0%, #0b2125 55%, #071619 100%);
    box-shadow:inset 0 0 0 1px rgba(240,220,160,.35),inset 0 0 40px rgba(0,0,0,.7);}
  .plate::before,.plate::after{content:"";position:absolute;border-radius:50%;border:1px solid rgba(240,220,160,.22);}
  .plate::before{inset:30px;} .plate::after{inset:60px;border-color:rgba(240,220,160,.14);}

  .rete{position:absolute;inset:40px;animation:spin 90s linear infinite;}
  .rete .sq{position:absolute;inset:14%;border:1.5px solid rgba(240,220,160,.55);border-radius:6px;
    box-shadow:0 0 16px rgba(240,220,160,.18);}
  .rete .sq.b{transform:rotate(45deg);}
  .rete .pt{position:absolute;width:7px;height:7px;border-radius:50%;background:var(--brass-1);
    box-shadow:0 0 10px rgba(240,220,160,.8);}
  .rete .pt:nth-child(3){top:-3px;left:calc(50% - 3.5px);} .rete .pt:nth-child(4){bottom:-3px;left:calc(50% - 3.5px);}
  .rete .pt:nth-child(5){left:-3px;top:calc(50% - 3.5px);} .rete .pt:nth-child(6){right:-3px;top:calc(50% - 3.5px);}

  .alidade{position:absolute;top:50%;left:7%;right:7%;height:3px;transform-origin:center;margin-top:-1.5px;
    background:linear-gradient(90deg,transparent,var(--brass-2) 12%,var(--brass-1) 50%,var(--brass-2) 88%,transparent);
    border-radius:3px;box-shadow:0 0 10px rgba(240,220,160,.4);animation:sweep 24s linear infinite;}
  .alidade::after{content:"";position:absolute;right:2%;top:50%;width:9px;height:9px;margin-top:-4.5px;border-radius:50%;
    background:var(--brass-1);box-shadow:0 0 12px rgba(240,220,160,.9);}

  .center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:118px;height:118px;border-radius:50%;
    display:grid;place-items:center;text-align:center;z-index:5;
    background:radial-gradient(circle at 50% 35%,#1b454a,#0a2024);
    box-shadow:0 0 0 3px #14100b,0 0 0 4px rgba(240,220,160,.4),inset 0 1px 0 rgba(240,220,160,.3),inset 0 -14px 26px rgba(0,0,0,.6);}
  .center .val{font-family:var(--serif);font-weight:600;font-size:50px;line-height:.9;color:var(--brass-1);
    text-shadow:0 1px 0 rgba(0,0,0,.6);}
  .center .val sup{font-size:20px;vertical-align:18px;color:var(--brass-2);}
  .center .cap{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#9fb6ae;margin-top:3px;}

  /* readout windows */
  .readout{display:flex;gap:10px;margin-top:30px;}
  .win{flex:1;text-align:center;border-radius:12px;padding:13px 8px;
    background:linear-gradient(180deg,#0e2629,#0a1c1f);box-shadow:inset 0 0 0 1px rgba(240,220,160,.28),var(--soft-sm);}
  .win .v{font-family:var(--serif);font-weight:600;font-size:26px;color:var(--brass-1);}
  .win .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:5px;}

  /* engraved plate list */
  .plate-list{margin-top:18px;border-radius:16px;padding:6px 16px;
    background:linear-gradient(180deg,#0f2a2c,#0a1f22);box-shadow:inset 0 0 0 1px rgba(240,220,160,.22),var(--soft-sm);}
  .pl{display:flex;align-items:center;gap:13px;padding:14px 0;border-bottom:1px solid rgba(240,220,160,.12);}
  .pl:last-child{border-bottom:none;}
  .pl .mk{width:38px;height:38px;border-radius:50%;flex:none;display:grid;place-items:center;
    font-family:var(--serif);font-weight:600;font-size:15px;color:#0a1c1f;background:var(--brass);
    box-shadow:0 0 14px -2px rgba(240,220,160,.5);}
  .pl .m{flex:1;} .pl .m .t{font-family:var(--serif);font-size:18px;color:var(--ink);}
  .pl .m .s{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .pl .ar{font-family:var(--ar);font-size:18px;color:var(--brass-1);}

  .cta{margin-top:18px;width:100%;border:none;cursor:pointer;font-family:var(--serif);font-style:italic;font-weight:600;
    font-size:19px;color:#0a1c1f;padding:16px;border-radius:14px;background:var(--brass);
    box-shadow:0 18px 44px -16px rgba(200,162,74,.6),inset 0 1px 0 rgba(255,255,255,.5);}

  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes sweep{to{transform:rotate(-360deg)}}
  @media (prefers-reduced-motion:reduce){.rete,.alidade{animation:none}}
</style></head>
<body>
  <header class="masthead">
    <span class="k">Concept VI</span>
    <h1>Asṭurlāb — <em>the instrument</em>.</h1>
    <p>Your ḥifẓ read like an astrolabe — the brass instrument of Muslim astronomers. Engraved rings, a turning rule, a star rete.</p>
  </header>

  <figure>
    <div class="phone"><div class="screen">
      <div class="top"><span class="lbl">Asṭurlāb · Ḥifẓ</span><span class="ar">المِيزان</span></div>

      <div class="dial">
        <div class="limb"></div>
        <div class="plate"></div>
        <div class="rete"><span class="sq a"></span><span class="sq b"></span>
          <span class="pt"></span><span class="pt"></span><span class="pt"></span><span class="pt"></span></div>
        <div class="alidade"></div>
        <div class="center"><div><div class="val">94<sup>°</sup></div><div class="cap">strength</div></div></div>
      </div>

      <div class="readout">
        <div class="win"><div class="v">12</div><div class="k">due</div></div>
        <div class="win"><div class="v">28</div><div class="k">weakest juz</div></div>
        <div class="win"><div class="v">21h</div><div class="k">since last</div></div>
      </div>

      <div class="plate-list">
        <div class="pl"><span class="mk">II</span><div class="m"><div class="t">Al-Baqarah · pp. 22–23</div><div class="s">far cycle · last sighted 9 days ago</div></div><span class="ar">٢</span></div>
        <div class="pl"><span class="mk">28</span><div class="m"><div class="t">An-Naba’ · p. 582</div><div class="s">drawn forward · weak lines marked</div></div><span class="ar">٢٨</span></div>
      </div>

      <button class="cta">Take your reading →</button>
    </div></div>
    <figcaption>Asṭurlāb · engraved brass, a turning rule &amp; star rete</figcaption>
  </figure>
</body></html>
