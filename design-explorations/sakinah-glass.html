<!DOCTYPE html>
<!-- Hifz — "SAKĪNAH": light aurora-glass (the serene, modern, LIGHT counterpart to Layl).
     Throwaway mockup. Signature: a soft pastel mesh-gradient sky, floating frosted glass
     (backdrop-filter), a translucent strength ring, very soft shadows, gentle drift. -->
<html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hifz · Sakīnah</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Reem+Kufi:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --lav:#c9c4ff;--peach:#ffd9c2;--mint:#c6f0e0;--sky:#c2e2ff;--rose:#ffd1e8;
    --ink:#2c2752;--muted:#7b7397;--accent:#7c5cff;--accent2:#19c4b4;
    --glass:rgba(255,255,255,.5);--glass-2:rgba(255,255,255,.34);--line:rgba(255,255,255,.75);
    --ui:'Plus Jakarta Sans',sans-serif;--serif:'Fraunces',Georgia,serif;--ar:'Reem Kufi',sans-serif;
    --soft:0 40px 80px -40px rgba(80,70,140,.45);--soft-sm:0 24px 46px -26px rgba(80,70,140,.3);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  body{font-family:var(--ui);color:var(--ink);min-height:100vh;padding:62px 26px 100px;
    background:
      radial-gradient(700px 500px at 12% 8%, #ded9ff,transparent 60%),
      radial-gradient(700px 500px at 92% 4%, #ffe2d2,transparent 60%),
      radial-gradient(800px 600px at 70% 100%, #cdeee2,transparent 60%),
      radial-gradient(700px 500px at 0% 90%, #d2e6ff,transparent 60%),
      #f4f1fb;}
  .masthead{max-width:900px;margin:0 auto 46px;text-align:center;}
  .masthead .k{display:inline-block;font-size:11px;letter-spacing:.3em;text-transform:uppercase;font-weight:700;
    color:var(--ink);background:var(--glass);border:1px solid var(--line);padding:8px 15px;border-radius:999px;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
  .masthead h1{font-family:var(--serif);font-weight:400;font-size:clamp(38px,6vw,72px);line-height:1.02;margin:14px 0 12px;}
  .masthead h1 em{font-style:italic;
    background:linear-gradient(100deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .masthead p{max-width:560px;margin:0 auto;color:#6a6390;font-size:16px;line-height:1.6;}
  figure{display:flex;flex-direction:column;align-items:center;gap:20px;}
  figcaption{font-family:var(--serif);font-style:italic;font-size:19px;color:#6a6390;}

  .phone{width:404px;height:858px;border-radius:54px;padding:13px;background:linear-gradient(160deg,#fff,#ece7fb);
    box-shadow:var(--soft),inset 0 1px 0 #fff;position:relative;margin:0 auto;}
  .phone::after{content:"";position:absolute;top:27px;left:50%;transform:translateX(-50%);width:116px;height:28px;
    border-radius:16px;background:#e7e1f6;z-index:30;}
  .screen{width:100%;height:100%;border-radius:42px;overflow:hidden;position:relative;padding:60px 24px 26px;
    background:
      radial-gradient(420px 320px at 10% 6%, #e1ddff,transparent 65%),
      radial-gradient(420px 320px at 96% 2%, #ffe6d8,transparent 65%),
      radial-gradient(480px 360px at 80% 100%, #d4f3e8,transparent 65%),
      radial-gradient(420px 320px at 0% 96%, #d8eaff,transparent 65%),
      #f7f5fe;}
  /* drifting soft blobs for depth */
  .blob{position:absolute;border-radius:50%;filter:blur(46px);opacity:.7;pointer-events:none;}
  .blob.x{width:200px;height:200px;background:var(--lav);top:120px;left:-50px;animation:drift 14s ease-in-out infinite;}
  .blob.y{width:180px;height:180px;background:var(--peach);top:60px;right:-50px;animation:drift 18s ease-in-out infinite reverse;}

  .top{position:relative;z-index:3;display:flex;align-items:center;justify-content:space-between;}
  .pill{display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--ink);
    background:var(--glass);border:1px solid var(--line);padding:10px 15px;border-radius:999px;
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:var(--soft-sm);}
  .iconbtn{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;font-size:18px;color:var(--ink);
    background:var(--glass);border:1px solid var(--line);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:var(--soft-sm);}

  /* hero glass card with translucent strength ring */
  .hero{position:relative;z-index:3;margin-top:22px;border-radius:32px;padding:26px;text-align:center;
    background:var(--glass);border:1px solid var(--line);box-shadow:var(--soft);
    backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);}
  .hero .ar{font-family:var(--ar);font-size:20px;color:var(--accent);}
  .hero h2{font-family:var(--serif);font-style:italic;font-weight:400;font-size:25px;margin-top:4px;color:var(--ink);}
  .ring{position:relative;width:188px;height:188px;margin:18px auto 6px;border-radius:50%;
    background:conic-gradient(from -90deg, var(--accent) 0%, var(--accent2) 52%, var(--peach) 84%, rgba(255,255,255,.5) 94%, rgba(255,255,255,.5) 100%);
    box-shadow:0 18px 40px -16px rgba(124,92,255,.5);display:grid;place-items:center;}
  .ring .hole{width:148px;height:148px;border-radius:50%;background:rgba(255,255,255,.66);
    border:1px solid var(--line);display:grid;place-items:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:inset 0 1px 0 #fff;}
  .ring .hole .v{font-family:var(--serif);font-weight:400;font-size:56px;line-height:.9;color:var(--ink);}
  .ring .hole .c{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
  .hero .sub{font-size:13px;color:var(--muted);margin-top:4px;}

  .chips{position:relative;z-index:3;display:flex;gap:11px;margin-top:14px;}
  .chip{flex:1;border-radius:20px;padding:14px 12px;text-align:center;background:var(--glass-2);
    border:1px solid var(--line);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:var(--soft-sm);}
  .chip .v{font-family:var(--serif);font-weight:400;font-size:26px;color:var(--ink);}
  .chip .k{font-size:11px;color:var(--muted);margin-top:4px;}

  .sect{position:relative;z-index:3;margin-top:18px;}
  .sect h3{font-family:var(--serif);font-style:italic;font-size:23px;color:var(--ink);margin:0 4px 12px;}
  .row{display:flex;align-items:center;gap:13px;border-radius:20px;padding:13px 14px;margin-bottom:11px;
    background:var(--glass);border:1px solid var(--line);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:var(--soft-sm);}
  .row .o{width:42px;height:42px;border-radius:14px;flex:none;display:grid;place-items:center;color:#fff;
    font-family:var(--serif);font-weight:500;font-size:15px;}
  .row .m{flex:1;min-width:0;} .row .m .t{font-weight:700;font-size:14.5px;color:var(--ink);}
  .row .m .s{font-size:12px;color:var(--muted);margin-top:2px;}
  .row .ar{font-family:var(--ar);font-size:18px;color:var(--accent);}

  .cta{position:relative;z-index:3;margin-top:6px;width:100%;border:none;cursor:pointer;color:#fff;font-weight:700;
    font-size:16px;padding:18px;border-radius:20px;background:linear-gradient(96deg,var(--accent),var(--accent2));
    box-shadow:0 20px 46px -18px rgba(124,92,255,.6);}

  @keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(18px,-22px)}}
  @media (prefers-reduced-motion:reduce){.blob{animation:none}}
</style></head>
<body>
  <header class="masthead">
    <span class="k">Concept VIII</span>
    <h1>Sakīnah — <em>tranquility</em>.</h1>
    <p>A soft aurora of pastel light with floating frosted glass — the serene, modern, daylight counterpart to Layl.</p>
  </header>

  <figure>
    <div class="phone"><div class="screen">
      <div class="blob x"></div><div class="blob y"></div>

      <div class="top">
        <span class="pill">☀ Good morning, Zakaria</span>
        <div class="iconbtn">❀</div>
      </div>

      <div class="hero">
        <div class="ar">السَّلامُ عَلَيْكُم</div>
        <h2>Your ḥifẓ is at peace.</h2>
        <div class="ring"><div class="hole"><div><div class="v">94</div><div class="c">strength</div></div></div></div>
        <div class="sub">steady across all thirty juz</div>
      </div>

      <div class="chips">
        <div class="chip"><div class="v">12</div><div class="k">due today</div></div>
        <div class="chip"><div class="v">≈18m</div><div class="k">gentle pace</div></div>
        <div class="chip"><div class="v">28</div><div class="k">to revisit</div></div>
      </div>

      <div class="sect">
        <h3>Today’s review</h3>
        <div class="row"><div class="o" style="background:linear-gradient(140deg,#7c5cff,#b39bff)">2</div>
          <div class="m"><div class="t">Al-Baqarah · pp. 22–23</div><div class="s">far cycle · last seen 9 days ago</div></div><span class="ar">البَقَرَة</span></div>
        <div class="row"><div class="o" style="background:linear-gradient(140deg,#19c4b4,#7fe0d2)">28</div>
          <div class="m"><div class="t">An-Naba’ · p. 582</div><div class="s">pulled forward · weak lines flagged</div></div><span class="ar">النَّبَأ</span></div>
      </div>

      <button class="cta">Begin in stillness →</button>
    </div></div>
    <figcaption>Sakīnah · pastel mesh + floating frosted glass</figcaption>
  </figure>
</body></html>
