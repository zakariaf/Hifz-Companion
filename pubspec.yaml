# The pub-workspace root. It declares the member graph and resolves it as one
# unit with a single committed pubspec.lock; it carries no application code and
# no dependencies beyond the SDK constraint — it resolves, it does not implement.
name: hifz_companion_workspace
publish_to: none

environment:
  sdk: ^3.6.0

# All eleven members in layer order (app + ten packages). models is the
# bottom-of-graph value-type member below engine; backup is pure-Dart over it.
workspace:
  - app
  - packages/models
  - packages/engine
  - packages/backup
  - packages/profiles
  - packages/data
  - packages/quran
  - packages/l10n
  - packages/composition
  - packages/features
  - packages/assets

# Tooling-only dev dependencies for the repo-level analysis context and gate
# tools — not application/runtime deps; the root still ships no code:
#   flutter_lints — the lint ruleset the shared analysis_options.yaml includes;
#   crypto        — SHA-256 for tool/verify_asset_hashes.dart (offline hashing;
#                   the network risk, package:http, stays confined to assets);
#   test          — the pure-Dart runner for the tool gates' suites (E05-T10's
#                   `dart test tool/test/...`); tool scripts resolve against this
#                   workspace root, so no separate tool/ package is needed.
dev_dependencies:
  flutter_lints: ^6.0.0
  crypto: ^3.0.0
  test: ^1.25.0

# Enables `flutter gen-l10n` to (re)generate the committed AppLocalizations into
# packages/l10n/lib/src/generated from the root l10n.yaml. Generation only; the
# root holds no application code and bundles no assets.
flutter:
  generate: true
